<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Title</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->

        <script src="https://cdn.tailwindcss.com"></script>

        
    </head>

    <body>
    
    <div class="container flex justify-center items-center h-screen">
        <div class="w-[50%] border border-black bg-white p-3 shadow-2xl ">
            <h2 class="text-5xl text-center my-3 text-black">Student SignIn</h2>
            <form action="">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Enter Username" class="p-1 border bg-white rounded w-full my-3">
                <input type="password" name="password" placeholder="Enter Password" class="p-1 border bg-white rounded w-full mb-3">
                <div class="flex justify-between">
                    <button class="px-2 py-2 bg-green-500 text-white rounded hover:bg-green-800">SignIn</button>
                    <a href="{% url 'signup' %}" class="text-blue-700 underline">New Student</a>
                </div>
            </form>
        </div>
    </div>
        
    </body>
</html>
