<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
           


    
      
  <div class="min-h-screen flex justify-center items-center">
    <div class="w-[50%] border-2 rounded shadow-2xl bg-amber-100 p-2">
        <h2 class="text-2xl text-center my-2">Payment Details</h2>
        <h2 class="my-2">Amount : <span class="font-bold">{{data.amount}}</span></h2>
        <button id="rzp-button1" class="bg-gray-800 text-white text-center w-full rounded shadow">Pay with Razorpay</button>

    </div>
  </div>

        <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
        <script>
            var orderId = "<%=orderId%>"
            var options = {
                "key": "{{data.razr_pay_key}}", // Enter the Key ID generated from the Dashboard
                "amount": "{{data.amount}}", // Amount is in currency subunits. 
                "currency": "INR",
                "name": "Course_Cloud",
                "description": "Buy Green Tea",
                "order_id":"{{data.razr_pay_order_id}}",
                "image": "https://example.com/your_logo",
                "callback_url": "http://localhost:8000/student/paymentverify",
                "redirect": true,
                "prefill": {
                    "name": "Anandhu",
                    "email": "anandhu@gmail.com",
                    "contact": "8989756445",
                },
                "notes": {
                    "address": "Hello World"
                },
                "theme": {
                    "color": "#3399cc"
                }
            }
            var rzp = new Razorpay(options);
            document.getElementById('rzp-button1').onclick = function (e) {
                rzp.open();
                e.preventDefault();
            }
        </script>
   
</body>
</html>
